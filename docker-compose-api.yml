version: '3.9'
services:
  evolution-api:
    container_name: nuvo-api
    image: atendai/evolution-api:v2.1.1
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - evolution-net
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:

networks:
  evolution-net:
    external: true